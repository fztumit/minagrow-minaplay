<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Anka maskotu">
  <defs>
    <radialGradient id="ankaWarmBg" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#fff8df"/>
      <stop offset="68%" stop-color="#ffe7a7"/>
      <stop offset="100%" stop-color="#ffd292"/>
    </radialGradient>
    <radialGradient id="ankaBody" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fff7df"/>
      <stop offset="55%" stop-color="#ffd363"/>
      <stop offset="100%" stop-color="#ff9e36"/>
    </radialGradient>
    <linearGradient id="ankaWing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffcf57"/>
      <stop offset="55%" stop-color="#ff9524"/>
      <stop offset="100%" stop-color="#f6611d"/>
    </linearGradient>
    <linearGradient id="ankaFlame" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9d00"/>
      <stop offset="45%" stop-color="#ff7a00"/>
      <stop offset="100%" stop-color="#fff07a"/>
    </linearGradient>
    <linearGradient id="ankaBeak" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="100%" stop-color="#ff9b1d"/>
    </linearGradient>
    <filter id="ankaGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#ffb73e" flood-opacity="0.28"/>
    </filter>
    <style>
      .anka-float {
        transform-origin: 128px 136px;
        animation: ankaFloat 4.8s ease-in-out infinite;
      }
      .anka-wing-left,
      .anka-wing-right {
        transform-box: fill-box;
        animation-duration: 3.6s;
        animation-timing-function: ease-in-out;
        animation-iteration-count: infinite;
      }
      .anka-wing-left {
        transform-origin: right center;
        animation-name: ankaWingLeft;
      }
      .anka-wing-right {
        transform-origin: left center;
        animation-name: ankaWingRight;
      }
      .anka-glow {
        transform-origin: 128px 128px;
        animation: ankaPulse 3.2s ease-in-out infinite;
      }
      .anka-sparkle {
        animation: ankaSparkle 3.4s ease-in-out infinite;
        transform-origin: center;
      }
      .anka-sparkle.delay {
        animation-delay: 1.2s;
      }
      .anka-sparkle.delay2 {
        animation-delay: 2s;
      }
      @keyframes ankaFloat {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }
      @keyframes ankaWingLeft {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(-8deg); }
      }
      @keyframes ankaWingRight {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(8deg); }
      }
      @keyframes ankaPulse {
        0%, 100% { opacity: 0.62; transform: scale(0.96); }
        50% { opacity: 1; transform: scale(1.06); }
      }
      @keyframes ankaSparkle {
        0%, 100% { opacity: 0.3; transform: scale(0.82); }
        50% { opacity: 1; transform: scale(1.08); }
      }
    </style>
  </defs>

  <rect width="256" height="256" rx="56" fill="url(#ankaWarmBg)"/>
  <circle class="anka-glow" cx="128" cy="128" r="86" fill="#fff6b8" opacity="0.78"/>

  <g class="anka-float" filter="url(#ankaGlow)">
    <path d="M102 60c8-22 24-36 45-40-3 18-11 33-24 45 14-3 29 1 40 12-16 6-31 8-44 6 13 7 22 19 24 35-20-6-34-18-41-35-5 12-15 22-31 29 2-20 11-36 31-52z" fill="url(#ankaFlame)"/>

    <g class="anka-wing-left">
      <path d="M82 132c-26 7-43 28-47 53 26-1 48-10 64-28 5 7 11 13 17 16-2-28-12-48-34-41z" fill="url(#ankaWing)"/>
      <path d="M84 141c-14 8-24 19-31 33 15-2 27-9 37-20" fill="none" stroke="#ffd972" stroke-linecap="round" stroke-width="5" opacity="0.7"/>
    </g>

    <g class="anka-wing-right">
      <path d="M174 132c26 7 43 28 47 53-26-1-48-10-64-28-5 7-11 13-17 16 2-28 12-48 34-41z" fill="url(#ankaWing)"/>
      <path d="M172 141c14 8 24 19 31 33-15-2-27-9-37-20" fill="none" stroke="#ffd972" stroke-linecap="round" stroke-width="5" opacity="0.7"/>
    </g>

    <ellipse cx="128" cy="145" rx="57" ry="62" fill="url(#ankaBody)"/>
    <ellipse cx="128" cy="116" rx="47" ry="40" fill="#fff4cf"/>
    <ellipse cx="128" cy="164" rx="26" ry="22" fill="#fff3c2" opacity="0.85"/>

    <path d="M101 186c-10 16-26 27-46 32 7-16 19-28 34-36" fill="none" stroke="#ff9d2a" stroke-linecap="round" stroke-width="10"/>
    <path d="M155 186c10 16 26 27 46 32-7-16-19-28-34-36" fill="none" stroke="#ff9d2a" stroke-linecap="round" stroke-width="10"/>

    <ellipse cx="105" cy="117" rx="17" ry="21" fill="#442313"/>
    <ellipse cx="151" cy="117" rx="17" ry="21" fill="#442313"/>
    <ellipse cx="110" cy="111" rx="7" ry="9" fill="#fffdfa"/>
    <ellipse cx="146" cy="111" rx="7" ry="9" fill="#fffdfa"/>
    <circle cx="114" cy="123" r="3.5" fill="#ffffff"/>
    <circle cx="150" cy="123" r="3.5" fill="#ffffff"/>

    <path d="M117 132c4-4 15-4 19 0 0 0-3 8-9.5 11-6.5-3-9.5-11-9.5-11z" fill="url(#ankaBeak)"/>
    <path d="M111 144c10 8 24 8 34 0" fill="none" stroke="#b2541e" stroke-linecap="round" stroke-width="4.5"/>
  </g>

  <g fill="#fff6b5">
    <path class="anka-sparkle" d="M41 76l4 9 9 4-9 4-4 9-4-9-9-4 9-4z"/>
    <path class="anka-sparkle delay" d="M215 62l3 7 7 3-7 3-3 7-3-7-7-3 7-3z"/>
    <path class="anka-sparkle delay2" d="M210 184l3 8 8 3-8 3-3 8-3-8-8-3 8-3z"/>
    <circle class="anka-sparkle delay" cx="56" cy="152" r="4"/>
    <circle class="anka-sparkle delay2" cx="191" cy="42" r="3.5"/>
  </g>
</svg>
