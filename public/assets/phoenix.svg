<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Anka maskotu">
  <defs>
    <radialGradient id="ankaAura" cx="50%" cy="48%" r="46%">
      <stop offset="0%" stop-color="#fff7be" stop-opacity="0.98"/>
      <stop offset="58%" stop-color="#ffd463" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#ffd463" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ankaBody" cx="50%" cy="26%" r="76%">
      <stop offset="0%" stop-color="#fff7df"/>
      <stop offset="48%" stop-color="#ffd86f"/>
      <stop offset="78%" stop-color="#ff9e2d"/>
      <stop offset="100%" stop-color="#f06416"/>
    </radialGradient>
    <radialGradient id="ankaFace" cx="50%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#fffdf5"/>
      <stop offset="70%" stop-color="#fff0be"/>
      <stop offset="100%" stop-color="#ffd993"/>
    </radialGradient>
    <linearGradient id="ankaWingOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffbb2d"/>
      <stop offset="48%" stop-color="#ff8d1b"/>
      <stop offset="100%" stop-color="#f25318"/>
    </linearGradient>
    <linearGradient id="ankaWingInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe977"/>
      <stop offset="55%" stop-color="#ffb230"/>
      <stop offset="100%" stop-color="#ff7a1f"/>
    </linearGradient>
    <linearGradient id="ankaCrest" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9417"/>
      <stop offset="44%" stop-color="#ff6d00"/>
      <stop offset="100%" stop-color="#fff27f"/>
    </linearGradient>
    <linearGradient id="ankaTail" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd65e"/>
      <stop offset="52%" stop-color="#ff9226"/>
      <stop offset="100%" stop-color="#ef4d17"/>
    </linearGradient>
    <radialGradient id="ankaEye" cx="50%" cy="35%" r="72%">
      <stop offset="0%" stop-color="#6a351f"/>
      <stop offset="62%" stop-color="#2d120a"/>
      <stop offset="100%" stop-color="#180804"/>
    </radialGradient>
    <linearGradient id="ankaBeak" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff07a"/>
      <stop offset="100%" stop-color="#ff971c"/>
    </linearGradient>
    <filter id="ankaShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#ffb148" flood-opacity="0.28"/>
    </filter>
    <style>
      .anka-float {
        transform-origin: 128px 136px;
        animation: ankaFloat 4.9s ease-in-out infinite;
      }
      .anka-wing-left,
      .anka-wing-right {
        transform-box: fill-box;
        animation: ankaWing 3.8s ease-in-out infinite;
      }
      .anka-wing-left {
        transform-origin: right center;
      }
      .anka-wing-right {
        transform-origin: left center;
        animation-name: ankaWingRight;
      }
      .anka-sparkle {
        animation: ankaSparkle 3.6s ease-in-out infinite;
        transform-origin: center;
      }
      .anka-sparkle.delay { animation-delay: 1.15s; }
      .anka-sparkle.delay2 { animation-delay: 2.05s; }
      .anka-glow {
        transform-origin: 128px 128px;
        animation: ankaGlow 3.4s ease-in-out infinite;
      }
      @keyframes ankaFloat {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-7px); }
      }
      @keyframes ankaWing {
        0%, 100% { transform: rotate(0deg) translateY(0px); }
        50% { transform: rotate(-8deg) translateY(-2px); }
      }
      @keyframes ankaWingRight {
        0%, 100% { transform: rotate(0deg) translateY(0px); }
        50% { transform: rotate(8deg) translateY(-2px); }
      }
      @keyframes ankaGlow {
        0%, 100% { opacity: 0.54; transform: scale(0.96); }
        50% { opacity: 0.98; transform: scale(1.05); }
      }
      @keyframes ankaSparkle {
        0%, 100% { opacity: 0.28; transform: scale(0.86); }
        50% { opacity: 1; transform: scale(1.1); }
      }
    </style>
  </defs>

  <circle class="anka-glow" cx="128" cy="136" r="92" fill="url(#ankaAura)"/>
  <ellipse cx="128" cy="224" rx="58" ry="12" fill="#ffcf7e" opacity="0.34"/>

  <g class="anka-float" filter="url(#ankaShadow)">
