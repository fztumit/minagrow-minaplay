      <path d="M97 149c-17 3-29 10-39 21 17 2 31 0 43-7" fill="#fff0a2" opacity="0.46"/>
    </g>

    <g class="anka-wing-right">
      <path d="M153 132c29 0 53 15 69 39-28 6-53 2-74-13-4 10-12 18-22 24-2-28 2-47 27-50z" fill="url(#ankaWingOuter)"/>
      <path d="M152 138c22 1 40 11 53 26-23 3-42 0-58-10" fill="#ffd55e" opacity="0.72"/>
      <path d="M159 149c17 3 29 10 39 21-17 2-31 0-43-7" fill="#fff0a2" opacity="0.46"/>
    </g>

    <ellipse cx="128" cy="148" rx="50" ry="57" fill="url(#ankaBody)"/>
    <circle cx="128" cy="102" r="39" fill="url(#ankaBody)"/>
    <ellipse cx="128" cy="108" rx="43" ry="33" fill="url(#ankaFace)"/>
    <ellipse cx="128" cy="154" rx="28" ry="26" fill="#fff1bc" opacity="0.9"/>

    <path d="M107 148c7 6 13 13 19 21" fill="none" stroke="#fff9d7" stroke-linecap="round" stroke-width="7" opacity="0.82"/>
    <path d="M149 148c-7 6-13 13-19 21" fill="none" stroke="#fff9d7" stroke-linecap="round" stroke-width="7" opacity="0.82"/>
    <path d="M118 142c4 8 6 17 7 24" fill="none" stroke="#fff8d9" stroke-linecap="round" stroke-width="6" opacity="0.88"/>
    <path d="M138 142c-4 8-6 17-7 24" fill="none" stroke="#fff8d9" stroke-linecap="round" stroke-width="6" opacity="0.88"/>

    <ellipse cx="107" cy="106" rx="19" ry="23" fill="url(#ankaEye)"/>
    <ellipse cx="149" cy="106" rx="19" ry="23" fill="url(#ankaEye)"/>
    <ellipse cx="112" cy="99" rx="7.5" ry="9.5" fill="#fffef8"/>
    <ellipse cx="144" cy="99" rx="7.5" ry="9.5" fill="#fffef8"/>
    <circle cx="117" cy="113" r="3.8" fill="#ffffff"/>
    <circle cx="149" cy="113" r="3.8" fill="#ffffff"/>

    <circle cx="92" cy="120" r="6.5" fill="#ffb19b" opacity="0.5"/>
    <circle cx="164" cy="120" r="6.5" fill="#ffb19b" opacity="0.5"/>

    <path d="M116 124c5-5 19-5 24 0 0 0-4 10-12 14-8-4-12-14-12-14z" fill="url(#ankaBeak)"/>
    <path d="M113 140c9 8 21 8 30 0" fill="none" stroke="#a84918" stroke-linecap="round" stroke-width="4.5"/>

    <g fill="#f38a22">
      <path d="M110 197c-2 10-8 16-16 19 2-11 6-17 14-21"/>
      <path d="M146 197c2 10 8 16 16 19-2-11-6-17-14-21"/>
    </g>
    <g stroke="#ffb83f" stroke-linecap="round" stroke-width="3.8">
      <path d="M96 215h10"/>
      <path d="M94 219h9"/>
      <path d="M150 215h10"/>
      <path d="M152 219h9"/>
